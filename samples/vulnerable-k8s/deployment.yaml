# Demo-only: intentionally insecure workload for P2DP Layer 2/3 scans.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-api
  labels:
    app: vulnerable-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-demo
  template:
    metadata:
      labels:
        app: vulnerable-demo
    spec:
      serviceAccountName: vulnerable-sa
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 8080
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            capabilities:
              add:
                - SYS_ADMIN
                - NET_ADMIN
                - SYS_PTRACE
          volumeMounts:
            - name: host-data
              mountPath: /host-data
      volumes:
        - name: host-data
          hostPath:
            path: /var/lib/demo-data
            type: DirectoryOrCreate
