version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: p2dp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-p2dp}
      POSTGRES_USER: ${POSTGRES_USER:-p2dp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p2dp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2dp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: p2dp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: p2dp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-p2dp}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-p2dp12345}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: p2dp-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://p2dp:p2dp@postgres:5432/p2dp
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-p2dp}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-p2dp12345}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GITOPS_REPO_PATH: /gitops-repo
      GITOPS_REMOTE_URL: ${GITOPS_REMOTE_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARGOCD_SERVER: ${ARGOCD_SERVER:-}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
    volumes:
      - ../backend:/app
      - ../gitops-repo:/gitops-repo
    command: uvicorn app.main:app --host 0.0.0.0 --reload

  celery-worker:
    build: ../backend
    container_name: p2dp-celery-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://p2dp:p2dp@postgres:5432/p2dp
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-p2dp}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-p2dp12345}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GITOPS_REPO_PATH: /gitops-repo
      GITOPS_REMOTE_URL: ${GITOPS_REMOTE_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARGOCD_SERVER: ${ARGOCD_SERVER:-}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
    volumes:
      - ../backend:/app
      - ../gitops-repo:/gitops-repo
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  frontend:
    build: ../frontend
    container_name: p2dp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  minio_data:
