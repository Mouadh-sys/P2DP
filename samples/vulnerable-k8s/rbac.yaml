# Demo-only: over-privileged identity for the vulnerable workload.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vulnerable-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vulnerable-cluster-admin
subjects:
  - kind: ServiceAccount
    name: vulnerable-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
