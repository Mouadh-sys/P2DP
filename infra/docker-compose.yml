x-backend-environment: &backend-environment
  ENVIRONMENT: ${ENVIRONMENT:-dev}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-p2dp}:${POSTGRES_PASSWORD:-p2dp}@postgres:5432/${POSTGRES_DB:-p2dp}
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-p2dp}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-p2dp12345}
  MINIO_BUCKET: ${MINIO_BUCKET:-p2dp-artifacts}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  GITOPS_REPO_PATH: /gitops-repo
  GITOPS_GIT_USER: ${GITOPS_GIT_USER:-p2dp-bot}
  GITOPS_GIT_EMAIL: ${GITOPS_GIT_EMAIL:-p2dp-bot@local}
  GITOPS_REMOTE_URL: ${GITOPS_REMOTE_URL:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  ARGOCD_SERVER: ${ARGOCD_SERVER:-}
  ARGOCD_TOKEN: ${ARGOCD_TOKEN:-}
  ARGOCD_APP_NAME: ${ARGOCD_APP_NAME:-p2dp-dev}
  KUBECTL_CONTEXT: ${KUBECTL_CONTEXT:-}
  K8S_NAMESPACE_PREFIX: ${K8S_NAMESPACE_PREFIX:-p2dp}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}

x-backend-volumes: &backend-volumes
  - ../backend:/app
  - ../gitops-repo:/gitops-repo
  - /var/run/docker.sock:/var/run/docker.sock

services:
  postgres:
    image: postgres:16-alpine
    container_name: p2dp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-p2dp}
      POSTGRES_USER: ${POSTGRES_USER:-p2dp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p2dp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: p2dp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: p2dp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-p2dp}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-p2dp12345}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: p2dp-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *backend-environment
    volumes: *backend-volumes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ../backend
    container_name: p2dp-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *backend-environment
    volumes: *backend-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app.celery_app inspect ping --timeout=5 2>/dev/null | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  frontend:
    build: ../frontend
    container_name: p2dp-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: npm run dev -- --host 0.0.0.0 --port 5173

  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: p2dp-jaeger
    profiles: [observability]
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: p2dp-otel-collector
    profiles: [observability]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

volumes:
  postgres_data:
  minio_data:
