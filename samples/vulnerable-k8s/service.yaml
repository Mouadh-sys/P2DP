# Demo-only: public exposure via LoadBalancer (no justification annotation).
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-api
  labels:
    app: vulnerable-demo
spec:
  type: LoadBalancer
  selector:
    app: vulnerable-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Demo-only: NodePort exposure for secondary attack surface.
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-api-nodeport
  labels:
    app: vulnerable-demo
spec:
  type: NodePort
  selector:
    app: vulnerable-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
